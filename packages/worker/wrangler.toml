name = "otter-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# --- 生产环境 (默认) ---
[vars]
ENVIRONMENT = "production"
D1_DATABASE_NAME = "otter-db"
R2_BUCKET_NAME = "otter-snapshots"
ICON_PREFIX = "apps/otter"

[[d1_databases]]
binding = "DB"
database_name = "otter-db"
database_id = "placeholder-prod-db-id"  # 从 CF Dashboard 获取后替换

[[r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "otter-snapshots"

[[r2_buckets]]
binding = "ICONS"
bucket_name = "zhe"

# 生产环境 secrets (通过 wrangler secret put 设置):
# - API_KEY: Next.js 调用 Worker 的密钥

# --- Staging 环境 ---
[env.staging]
vars = { ENVIRONMENT = "staging", D1_DATABASE_NAME = "otter-db-staging", R2_BUCKET_NAME = "otter-snapshots-staging", ICON_PREFIX = "apps/otter" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "otter-db-staging"
database_id = "placeholder-staging-db-id"

[[env.staging.r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "otter-snapshots-staging"

[[env.staging.r2_buckets]]
binding = "ICONS"
bucket_name = "zhe"

# --- 测试环境 (CI/E2E) ---
[env.test]
vars = { ENVIRONMENT = "test", D1_DATABASE_NAME = "otter-db-test", R2_BUCKET_NAME = "otter-snapshots-test", ICON_PREFIX = "apps/otter" }

[[env.test.d1_databases]]
binding = "DB"
database_name = "otter-db-test"
database_id = "placeholder-test-db-id"

[[env.test.r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "otter-snapshots-test"

[[env.test.r2_buckets]]
binding = "ICONS"
bucket_name = "zhe"
