# Otter CD
# - CI green on main → deploy: continuous deploy of latest main
# - workflow_dispatch → deploy: manual redeploy
name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Worker (production)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-otter-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build monorepo (SPA + worker)
        run: bun run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: deploy

      - name: Verify deployment
        run: |
          set -e
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" https://otter.hexly.ai/api/live || true)
            echo "attempt $i: status=$STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              echo "✅ Worker reachable (status $STATUS)"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Deployment verification failed after 30s"
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### Otter Deploy"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- SHA: \`${{ github.event.workflow_run.head_sha || github.sha }}\`"
            echo "- Worker: \`otter\` (production)"
            echo "- Verify: https://otter.hexly.ai/api/live"
          } >> "$GITHUB_STEP_SUMMARY"
