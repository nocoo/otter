name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.4
    with:
      test-command: "bun run test:coverage"
      typecheck-command: "bun run lint"
      lint-command: "bun run lint:biome"
      enable-l3: "true"
      l3-command: "bun run test:e2e:bdd"
      l3-browser: "chromium"
    secrets: inherit

  l2:
    name: L2 API E2E (local wrangler dev)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Build all packages (web SPA + core/cli/api dist)
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/cli build
          bun run --cwd packages/api build
          bun run build
      - name: L2 API + CLI E2E (local)
        run: bun run test:l2
